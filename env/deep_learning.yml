# marm_behavior conda environment
# ================================
#
# Recreates the lab's reference Python environment for running the
# pipeline. Identical to the original Windows env that produced the
# canonical hcoord/hlabel reference outputs, with platform-specific
# Conda packages (vc, vs2015_runtime, wincertstore) stripped so the
# same file works on Linux/macOS too. The actual ML stack (TensorFlow
# 2.9.1, openTSNE 0.6.2, scikit-learn 1.1.2, DeepLabCut 2.2.0.6, etc.)
# matches the original exactly — important because the nn stage's
# t-SNE output is sensitive to openTSNE's version.
#
# Create the env:
#     conda env create -f env/deep_learning.yml
#
# Activate and install marm_behavior into it:
#     conda activate deep_learning
#     pip install -e .
#
# Then any time you want to run the pipeline:
#     conda activate deep_learning
#     python -m marm_behavior /path/to/video.avi
#
# Notes on package versions
# -------------------------
# These are pinned to match the lab's reference setup. Loosening any
# of them risks numerical drift in the nn stage's outputs:
#
# * tensorflow==2.9.1      — encoder graph & predict() determinism
# * openTSNE==0.6.2        — affinity & gradient-descent internals
# * scikit-learn==1.1.2    — KNN tie-breaking
# * deeplabcut==2.2.0.6    — pose-inference graph
# * numpy==1.22.4          — random-state / dtype-promotion behaviour
#
# If you need to upgrade any of these, expect the nn-stage outputs to
# shift by a few percent. Re-validate against your reference set.

name: deep_learning

channels:
  - defaults

dependencies:
  - python=3.8.12
  - pip=22.1.2
  - setuptools=63.4.1
  - wheel=0.37.1
  - sqlite=3.39.2

  - pip:
    # core scientific stack
    - numpy==1.22.4
    - scipy==1.9.0
    - pandas==1.4.3
    - h5py==3.7.0
    - mat73==0.59
